<title>Atlas · Hermes Agent dashboard</title>
<!--
  ════════════════════════════════════════════════════════════════════════════
  ATLAS — read-only monitoring dashboard for a self-hosted Hermes Agent.
  Cream/vermilion bento (matches the reference) + a togglable pixel re-skin and
  a WorkAdventure-style pixel "Visualize" office.

  SECURITY: this prototype only ever issues GET requests (see data.js). No
  mutating endpoint is wired anywhere. Reach Hermes' :9119 dashboard API over an
  SSH tunnel or behind an HTTPS+password proxy; never expose :9119 raw.
  Unreachable agent → labelled DEMO data so the page never looks broken.
  ════════════════════════════════════════════════════════════════════════════
-->
