name: Shell lint

on:
  push:
    paths:
      - "setup"
      - "**.sh"
  pull_request:
    paths:
      - "setup"
      - "**.sh"

jobs:
  shellcheck:
    name: ShellCheck + shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck shfmt

      - name: Collect shell files
        id: files
        run: |
          # Find *.sh anywhere, plus the bare 'setup' script at repo root
          files=$(find . -name "*.sh" -not -path "*/node_modules/*" -not -path "*/.git/*")
          # Add 'setup' only if it has a bash shebang
          if head -1 setup 2>/dev/null | grep -qE '(bash|sh)'; then
            files="$files setup"
          fi
          echo "files=$files" >> "$GITHUB_OUTPUT"
          echo "Targets: $files"

      - name: ShellCheck
        run: |
          # SC2086 (word-splitting on unquoted vars) is the most important class — keep strict
          shellcheck --severity=warning ${{ steps.files.outputs.files }}

      - name: shfmt (format diff)
        run: |
          # -i 2: 2-space indent  -ci: case-indent  -bn: binary-op on new line
          shfmt -i 2 -ci -bn -d ${{ steps.files.outputs.files }}
