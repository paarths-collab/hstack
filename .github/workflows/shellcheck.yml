name: Shell lint

on:
  push:
    paths:
      - "setup"
      - "**.sh"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "setup"
      - "**.sh"
      - ".github/workflows/shellcheck.yml"
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck + shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck shfmt

      - name: ShellCheck
        run: |
          # Find *.sh anywhere, plus the bare 'setup' script at repo root
          # (only if it has a bash/sh shebang). Feed via xargs so multi-line
          # file lists work without GITHUB_OUTPUT heredoc gymnastics.
          {
            find . -name "*.sh" -not -path "*/node_modules/*" -not -path "*/.git/*"
            if head -1 setup 2>/dev/null | grep -qE '(bash|sh)'; then echo setup; fi
          } | xargs shellcheck --severity=warning

      - name: shfmt (format diff)
        run: |
          # -i 2: 2-space indent  -ci: case-indent  -bn: binary-op on new line
          {
            find . -name "*.sh" -not -path "*/node_modules/*" -not -path "*/.git/*"
            if head -1 setup 2>/dev/null | grep -qE '(bash|sh)'; then echo setup; fi
          } | xargs shfmt -i 2 -ci -bn -d
