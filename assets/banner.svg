<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="hstack — one command, your own AI agent, deployed">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#39d353"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#58a6ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#21262d" stroke-width="1" opacity="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- accent bar -->
  <rect x="80" y="96" width="6" height="128" rx="3" fill="url(#accent)"/>

  <!-- wordmark -->
  <text x="112" y="158" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="74" font-weight="800" fill="#f0f6fc" letter-spacing="-2">hstack</text>
  <text x="116" y="206" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="600" fill="#c9d1d9">One command. Your own AI agent, deployed.</text>
  <text x="116" y="244" font-family="ui-monospace, monospace" font-size="16" fill="#8b949e">Claude Code installs &amp; hardens a self-hosted Hermes Agent for you.</text>

  <!-- terminal card -->
  <g transform="translate(760,86)">
    <rect width="360" height="148" rx="12" fill="#0b0f14" stroke="#30363d"/>
    <circle cx="22" cy="24" r="6" fill="#ff5f56"/><circle cx="44" cy="24" r="6" fill="#ffbd2e"/><circle cx="66" cy="24" r="6" fill="#27c93f"/>
    <text x="22" y="68" font-family="ui-monospace, monospace" font-size="15" fill="#7ee787">$ /hermes-deploy</text>
    <text x="22" y="94" font-family="ui-monospace, monospace" font-size="14" fill="#8b949e">→ install · model · platforms</text>
    <text x="22" y="116" font-family="ui-monospace, monospace" font-size="14" fill="#8b949e">→ memory · autostart · verify</text>
    <text x="22" y="138" font-family="ui-monospace, monospace" font-size="14" fill="#2dd4bf">✓ agent online ✅</text>
  </g>
</svg>
