<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="hstack — deploy AI agents faster, one command. Marketing hero with a mock agent dashboard, command list, and deploy pipeline.">
  <defs>
    <linearGradient id="hcopper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8b86a"/>
      <stop offset="0.5" stop-color="#f0871f"/>
      <stop offset="1" stop-color="#c2510b"/>
    </linearGradient>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1410"/>
      <stop offset="1" stop-color="#120c08"/>
    </linearGradient>
    <radialGradient id="hglow" cx="0.3" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#f0871f" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#f0871f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="520" rx="16" fill="url(#hbg)"/>
  <rect width="1200" height="520" rx="16" fill="url(#hglow)"/>
  <rect x="1.5" y="1.5" width="1197" height="517" rx="15" fill="none" stroke="#3a2a1e" stroke-width="2"/>

  <!-- ░░ LEFT: brand + tagline ░░ -->
  <text x="64" y="92" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#d9824a" letter-spacing="4">◆ ONE-COMMAND AGENT DEPLOY</text>

  <text x="60" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="150" font-weight="700">
    <tspan fill="#f3e3d0">h</tspan><tspan fill="url(#hcopper)">stack</tspan>
  </text>

  <text x="64" y="300" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="44" font-weight="800" fill="#f3e3d0">Deploy AI Agents Faster</text>
  <text x="64" y="342" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="19" fill="#b09a82">From an empty server to an AI on your phone —</text>
  <text x="64" y="370" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="19" fill="#b09a82">one paste, about five questions, ~30 minutes.</text>

  <!-- pill -->
  <rect x="64" y="404" width="356" height="52" rx="26" fill="#241914" stroke="#5a3a22"/>
  <circle cx="96" cy="430" r="15" fill="none" stroke="url(#hcopper)" stroke-width="2.5"/>
  <path d="M89 430 q7 -12 14 0 q-7 12 -14 0z" fill="url(#hcopper)"/>
  <text x="124" y="436" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#f0871f" letter-spacing="1">CLAUDE CODE · SELF-HOSTED · MIT</text>

  <!-- ░░ RIGHT: mock agent dashboard card ░░ -->
  <g transform="translate(596,70)">
    <rect width="340" height="300" rx="12" fill="#0f0a07" stroke="#3a2a1e"/>
    <!-- card title row -->
    <circle cx="22" cy="26" r="5" fill="#4ec94e"/>
    <text x="38" y="31" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#4ec94e">ONLINE</text>
    <text x="318" y="31" text-anchor="end" font-family="ui-monospace, monospace" font-size="11" fill="#6b5640">hermes v0.15.2</text>
    <line x1="16" y1="44" x2="324" y2="44" stroke="#2a1f16"/>
    <!-- headline -->
    <text x="22" y="78" font-family="-apple-system, Segoe UI, sans-serif" font-size="20" font-weight="800" fill="#f3e3d0">Your agent is online ✅</text>
    <text x="22" y="104" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" fill="#9c8467">Reachable now on your messaging apps.</text>
    <!-- platform chips -->
    <g font-family="ui-monospace, monospace" font-size="12" font-weight="700">
      <rect x="22" y="124" width="92" height="28" rx="14" fill="#15233a"/><circle cx="40" cy="138" r="5" fill="#229ED9"/><text x="52" y="142" fill="#9fc4e6">Telegram</text>
      <rect x="124" y="124" width="84" height="28" rx="14" fill="#211a36"/><circle cx="142" cy="138" r="5" fill="#9d6bff"/><text x="154" y="142" fill="#c3aef0">Discord</text>
      <rect x="218" y="124" width="84" height="28" rx="14" fill="#0f2a1c"/><circle cx="236" cy="138" r="5" fill="#25D366"/><text x="248" y="142" fill="#8fe0ad">WhatsApp</text>
    </g>
    <!-- health bar -->
    <text x="22" y="186" font-family="ui-monospace, monospace" font-size="12" fill="#9c8467">SERVER HEALTH</text>
    <rect x="22" y="196" width="300" height="10" rx="5" fill="#241914"/>
    <rect x="22" y="196" width="78" height="10" rx="5" fill="url(#hcopper)"/>
    <text x="324" y="186" text-anchor="end" font-family="ui-monospace, monospace" font-size="12" fill="#f0871f">26%</text>
    <!-- stats row -->
    <g font-family="ui-monospace, monospace">
      <text x="22" y="244" font-size="26" font-weight="800" fill="#f3e3d0">3</text><text x="22" y="264" font-size="11" fill="#9c8467">SCHEDULED</text>
      <text x="130" y="244" font-size="26" font-weight="800" fill="#f3e3d0">212</text><text x="130" y="264" font-size="11" fill="#9c8467">MSGS · 7d</text>
      <text x="240" y="244" font-size="26" font-weight="800" fill="#f3e3d0">$3.74</text><text x="240" y="264" font-size="11" fill="#9c8467">COST · 7d</text>
    </g>
  </g>

  <!-- command sidebar -->
  <g transform="translate(956,70)">
    <text x="0" y="14" font-family="ui-monospace, monospace" font-size="12" font-weight="700" fill="#6b5640" letter-spacing="2">/HSTACK COMMANDS</text>
    <g font-family="ui-monospace, monospace" font-size="14">
      <rect x="0" y="30" width="186" height="34" rx="8" fill="#241914" stroke="#5a3a22"/><text x="14" y="52" fill="#f0871f">▸ /hermes-deploy</text>
      <text x="14" y="92" fill="#d9824a">/hermes-status</text>
      <text x="14" y="124" fill="#d9824a">/platform-telegram</text>
      <text x="14" y="156" fill="#d9824a">/hermes-dashboard</text>
      <text x="14" y="188" fill="#d9824a">/hermes-update</text>
      <text x="14" y="220" fill="#d9824a">/hermes-fix</text>
    </g>
  </g>

  <!-- ░░ DEPLOY PIPELINE row ░░ -->
  <g transform="translate(596,408)">
    <text x="0" y="0" font-family="ui-monospace, monospace" font-size="12" font-weight="700" fill="#6b5640" letter-spacing="2">DEPLOY PIPELINE</text>
    <g font-family="-apple-system, Segoe UI, sans-serif" font-size="12" fill="#b09a82" text-anchor="middle">
      <!-- connecting line -->
      <line x1="40" y1="34" x2="500" y2="34" stroke="#3a2a1e" stroke-width="2"/>
      <circle cx="40"  cy="34" r="14" fill="#241914" stroke="#5a3a22"/><text x="40"  y="64">Install</text>
      <circle cx="132" cy="34" r="14" fill="#241914" stroke="#5a3a22"/><text x="132" y="64">Model</text>
      <circle cx="224" cy="34" r="14" fill="#241914" stroke="#5a3a22"/><text x="224" y="64">Platforms</text>
      <circle cx="316" cy="34" r="14" fill="#241914" stroke="#5a3a22"/><text x="316" y="64">Memory</text>
      <circle cx="408" cy="34" r="14" fill="#241914" stroke="#5a3a22"/><text x="408" y="64">Autostart</text>
      <circle cx="500" cy="34" r="15" fill="url(#hcopper)"/><text x="500" y="39" font-size="14" fill="#1c1410" font-weight="900">✓</text><text x="500" y="64" fill="#f0871f" font-weight="700">Verify</text>
    </g>
  </g>
</svg>
